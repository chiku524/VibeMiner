# Build VibeMiner desktop (Tauri 2) for Windows, macOS, and Linux when a version tag is pushed (v*),
# then create a GitHub Release with installers. Does not run on ordinary branch pushes—only new/updated v* tags.
# Asset names match the download API (VibeMiner-Setup-*.exe, *-arm64.dmg, *.AppImage).
#
# Optional: code signing / notarization — see docs/DESKTOP_APP.md.
# In-app updates: TAURI_SIGNING_PRIVATE_KEY must be the full minisign .key file (both lines). Must match `plugins.updater.pubkey` in apps/tauri/src-tauri/tauri.conf.json. See docs/DESKTOP_APP.md.

name: Release desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.0.8). Use when the tag exists but the release was never created.'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        run: node .github/scripts/set-tauri-release-version.mjs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Install dependencies
        run: npm ci

      # Main window loads VIBEMINER_APP_URL (default vibeminer.tech); build web so CI matches shipped UX + desktop-bridge.
      - name: Build shared + web
        run: npm run build -w @vibeminer/shared && npm run build -w vibeminer-web

      - name: Build Tauri (Windows)
        run: npm run build -w vibeminer-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VIBEMINER_APP_URL: ${{ secrets.VIBEMINER_APP_URL }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/tauri/src-tauri/target/release/bundle/**/*.exe
            apps/tauri/src-tauri/target/release/bundle/**/*.sig

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        run: node .github/scripts/set-tauri-release-version.mjs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Install dependencies
        run: npm ci

      - name: Build shared + web
        run: npm run build -w @vibeminer/shared && npm run build -w vibeminer-web

      - name: Build Tauri (macOS)
        run: npm run build -w vibeminer-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VIBEMINER_APP_URL: ${{ secrets.VIBEMINER_APP_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/tauri/src-tauri/target/release/bundle/**/*.dmg
            apps/tauri/src-tauri/target/release/bundle/**/*.app.tar.gz
            apps/tauri/src-tauri/target/release/bundle/**/*.sig

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev build-essential curl wget file

      - name: Set version from tag
        run: node .github/scripts/set-tauri-release-version.mjs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Install dependencies
        run: npm ci

      - name: Build shared + web
        run: npm run build -w @vibeminer/shared && npm run build -w vibeminer-web

      - name: Build Tauri (Linux)
        run: npm run build -w vibeminer-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VIBEMINER_APP_URL: ${{ secrets.VIBEMINER_APP_URL }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/tauri/src-tauri/target/release/bundle/**/*.AppImage
            apps/tauri/src-tauri/target/release/bundle/**/*.sig

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts
          merge-multiple: true

      # Copy Tauri bundle outputs to fixed names so /releases/latest/download and the GitHub API resolve.
      - name: Add latest and versioned asset names
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -e
          VER="${VERSION#v}"
          cd artifacts
          echo "Artifact layout:"
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) | head -30

          win_exe=$(find . -type f -name '*-setup.exe' | head -1)
          if [ -z "$win_exe" ]; then win_exe=$(find . -type f -name "*.exe" ! -iname "*uninstall*" | head -1); fi
          if [ -z "$win_exe" ]; then echo "No Windows .exe found"; exit 1; fi
          echo "Windows: $win_exe"
          cp "$win_exe" "VibeMiner-Setup-latest.exe"
          cp "$win_exe" "VibeMiner-Setup-${VER}.exe"
          if [ -f "${win_exe}.sig" ]; then
            cp "${win_exe}.sig" "VibeMiner-Setup-latest.exe.sig"
            cp "${win_exe}.sig" "VibeMiner-Setup-${VER}.exe.sig"
          fi

          dmg=$(find . -type f -name "*.dmg" | head -1)
          if [ -z "$dmg" ]; then echo "No macOS .dmg found"; exit 1; fi
          echo "macOS dmg: $dmg"
          cp "$dmg" "VibeMiner-latest-arm64.dmg"
          cp "$dmg" "VibeMiner-${VER}-arm64.dmg"

          app_tgz=$(find . -type f -name "*.app.tar.gz" | head -1)
          if [ -n "$app_tgz" ]; then
            echo "macOS updater: $app_tgz"
            cp "$app_tgz" "VibeMiner-latest-aarch64.app.tar.gz"
            if [ -f "${app_tgz}.sig" ]; then
              cp "${app_tgz}.sig" "VibeMiner-latest-aarch64.app.tar.gz.sig"
            fi
            # x64 macOS updater bundle (if the build produces it)
            app_tgz_x64=$(find . -type f -name "*.app.tar.gz" ! -name "*aarch64*" ! -name "*arm64*" | head -1)
            if [ -n "$app_tgz_x64" ] && [ "$app_tgz_x64" != "$app_tgz" ]; then
              echo "macOS x64 updater: $app_tgz_x64"
              cp "$app_tgz_x64" "VibeMiner-latest-x64.app.tar.gz"
              if [ -f "${app_tgz_x64}.sig" ]; then cp "${app_tgz_x64}.sig" "VibeMiner-latest-x64.app.tar.gz.sig"; fi
            fi
          else
            echo "No macOS .app.tar.gz (updater bundle) — OK when updater signing is not configured"
          fi

          appimg=$(find . -type f -name "*.AppImage" | head -1)
          if [ -z "$appimg" ]; then echo "No Linux .AppImage found"; exit 1; fi
          echo "Linux: $appimg"
          cp "$appimg" "VibeMiner-latest.AppImage"
          cp "$appimg" "VibeMiner-${VER}.AppImage"
          if [ -f "${appimg}.sig" ]; then
            cp "${appimg}.sig" "VibeMiner-latest.AppImage.sig"
            cp "${appimg}.sig" "VibeMiner-${VER}.AppImage.sig"
          fi

          ls -la
          test -f "VibeMiner-Setup-latest.exe"
          test -f "VibeMiner-Setup-${VER}.exe"
          test -f "VibeMiner-latest-arm64.dmg"
          test -f "VibeMiner-${VER}-arm64.dmg"
          test -f "VibeMiner-latest.AppImage"
          test -f "VibeMiner-${VER}.AppImage"

      - name: Generate updater latest.json
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -e
          VER="${VERSION#v}"
          node .github/scripts/generate-updater-latest.mjs artifacts "$VER" chiku524/VibeMiner "$VERSION"
          if [ ! -f artifacts/latest.json ]; then
            echo "::warning::latest.json was not generated (no signed updater bundles). In-app auto-update will not work until signing produces .sig files."
          else
            echo "Updater manifest:" && cat artifacts/latest.json
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: VibeMiner desktop ${{ env.RELEASE_TAG }}
          body: |
            ## Desktop installers
            Download the installer for your platform below. Same app as the web—runs in its own window (Tauri). Built and published by [nico.builds](https://nico.builds).
            - **Windows**: run the `.exe` installer
            - **macOS**: open the `.dmg` and drag VibeMiner to Applications
            - **Linux**: make the `.AppImage` executable and run it
          files: artifacts/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
